# Universal Arbitrage Stack
# `docker compose up` brings up:
#   - ibga          : IB Gateway (separate container, GUI app, needs 2FA approval)
#   - arbitrage     : all-in-one (backend + Ollama + ngrok + Colab executor)
services:
  ibga:
    image: heshiming/ibga
    container_name: ibga-trading
    restart: always
    ipc: host
    shm_size: 512mb
    environment:
      - TERM=xterm
      - IB_USERNAME=${IB_USERNAME:-fiend6969}
      - IB_PASSWORD=${IB_PASSWORD}
      - IB_REGION=America
      - IB_TIMEZONE=America/Vancouver
      - IB_LOGINTAB=IB API
      - IB_LOGINTYPE=Live Trading
      - IB_PREFER_IBKEY=true
    volumes:
      - ./data:/home/ibg_settings
    ports:
      - "15800:5800"   # VNC dashboard
      - "40000:4000"
      - "40010:4001"   # IBKR API (live)
      - "40020:4002"
    networks:
      - arbitrage-net

  arbitrage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbitrage-universal
    restart: always
    shm_size: 4gb
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"    # FastAPI backend
      - "5000:5000"    # Dashboard / colab executor
      - "4040:4040"    # ngrok inspector
      - "11434:11434"  # Ollama API
    environment:
      - PYTHONPATH=/app
      - IB_GATEWAY_URL=http://ibga:4001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_PROVIDER=openrouter
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NGROK_AUTH_TOKEN=${NGROK_AUTH_TOKEN}
      - NGROK_DOMAIN=${NGROK_DOMAIN:-copyrightable-pseudocartilaginous-sade.ngrok-free.dev}
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODELS=${OLLAMA_MODELS:-llama3.1:8b}
      - IBGA_WAIT_TIMEOUT=${IBGA_WAIT_TIMEOUT:-600}
    volumes:
      - ./backend:/app/backend
      - ./reports:/app/reports
      - ./Cloud_GPU_Matcher_v4_Stable.ipynb:/app/Cloud_GPU_Matcher_v4_Stable.ipynb
      - ./Cloud_GPU_Matcher_v3_Auto.ipynb:/app/Cloud_GPU_Matcher_v3_Auto.ipynb
      - ./data:/app/data
      - ./logs:/app/logs
      - ollama-models:/root/.ollama
    depends_on:
      - ibga
    networks:
      - arbitrage-net
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 3G

networks:
  arbitrage-net:
    driver: bridge

volumes:
  ollama-models:
