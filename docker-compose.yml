# Universal Arbitrage Stack
#   docker compose up --build
# brings up ONE container that runs IB Gateway, the FastAPI backend,
# Ollama, ngrok, and the Playwright-driven Colab executor.
services:
  universal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbitrage-universal
    restart: always
    ipc: host
    shm_size: 4gb
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"    # FastAPI backend
      - "5000:5000"    # Colab executor + /colab-setup page
      - "4040:4040"    # ngrok inspector
      - "11434:11434"  # Ollama API
    environment:
      # ----- IB Gateway -----
      - TERM=xterm
      - IB_USERNAME=${IB_USERNAME:-fiend6969}
      - IB_PASSWORD=${IB_PASSWORD}
      - IB_REGION=America
      - IB_TIMEZONE=America/Vancouver
      - IB_LOGINTAB=IB API
      - IB_LOGINTYPE=Live Trading
      - IB_PREFER_IBKEY=true
      - IBG_PORT_INTERNAL=4001
      - IB_GATEWAY_URL=http://localhost:4001
      - IBGA_WAIT_TIMEOUT=${IBGA_WAIT_TIMEOUT:-600}
      # ----- Backend / LLM -----
      - PYTHONPATH=/app
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_PROVIDER=openrouter
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ORACLE_EXECUTOR_URL=http://localhost:5000
      # ----- Ollama -----
      - OLLAMA_URL=http://localhost:11434
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODELS=${OLLAMA_MODELS:-llama3.1:8b}
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      # ----- ngrok -----
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - NGROK_DOMAIN=${NGROK_DOMAIN:-copyrightable-pseudocartilaginous-sade.ngrok-free.dev}
      # ----- Optional: Google / Colab service-account auth -----
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - COLAB_NOTEBOOK_DRIVE_ID=${COLAB_NOTEBOOK_DRIVE_ID}
      - COLAB_AUTH_STATE=/app/data/colab_state.json
    volumes:
      - ./data:/home/ibg_settings
      - ./backend:/app/backend
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./Cloud_GPU_Matcher_v4_Stable.ipynb:/app/Cloud_GPU_Matcher_v4_Stable.ipynb
      - ./Cloud_GPU_Matcher_v3_Auto.ipynb:/app/Cloud_GPU_Matcher_v3_Auto.ipynb
      - ./data:/app/data
      - ollama-models:/root/.ollama

networks:
  default:
    driver: bridge

volumes:
  ollama-models:
