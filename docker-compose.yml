# Universal Arbitrage Stack
#   docker compose up --build
# brings up ONE container that runs IB Gateway, the FastAPI backend,
# ngrok, and the Playwright-driven Colab executor.
# LLM verification runs remotely (Kaggle Ollama / OpenRouter) — no local Ollama.
services:
  universal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbitrage-universal
    restart: always
    ipc: host
    shm_size: 4gb
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"    # FastAPI backend
      - "5000:5000"    # Kaggle executor
      - "4040:4040"    # ngrok inspector
    environment:
      # ----- IB Gateway -----
      - TERM=xterm
      - IB_USERNAME=${IB_USERNAME:-fiend6969}
      - IB_PASSWORD=${IB_PASSWORD}
      - IB_REGION=America
      - IB_TIMEZONE=America/Vancouver
      - IB_LOGINTAB=IB API
      - IB_LOGINTYPE=Live Trading
      - IB_PREFER_IBKEY=true
      - IBG_PORT_INTERNAL=4000
      - IB_GATEWAY_URL=http://localhost:4000
      - IBGA_WAIT_TIMEOUT=${IBGA_WAIT_TIMEOUT:-600}
      # ----- Backend / LLM -----
      - PYTHONPATH=/app
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_PROVIDER=openrouter
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ORACLE_EXECUTOR_URL=http://localhost:5000
      # ----- Remote verification (Session 2: Kaggle Ollama qwen3.6:27b) -----
      # REMOTE_VERIFY on  -> park the 2000 matches for the Kaggle verifier to pull
      #                      over the tailnet (set REMOTE_VERIFY=0 to revert to
      #                      inline local-Ollama verification).
      # AUTOLAUNCH off by default -> matches park, but you fire Session 2 deliberately
      #                      with `python verifier_launcher.py` (set =1 to auto-push).
      # IBKR round 2 (warm TWS re-pass, ~17 min): on | off | auto (default auto =
      # skip when the prior scan's round 2 added < IBKR_ROUND2_MIN_NEW markets).
      - IBKR_ROUND2=${IBKR_ROUND2:-auto}
      - IBKR_ROUND2_MIN_NEW=${IBKR_ROUND2_MIN_NEW:-25}
      - REMOTE_VERIFY=${REMOTE_VERIFY:-1}
      - REMOTE_VERIFY_AUTOLAUNCH=${REMOTE_VERIFY_AUTOLAUNCH:-0}
      - REMOTE_VERIFY_MODEL=${REMOTE_VERIFY_MODEL:-qwen3.6:27b}
      - REMOTE_VERIFY_WORKERS=${REMOTE_VERIFY_WORKERS:-3}
      - REMOTE_VERIFY_KERNEL_SLUG=${REMOTE_VERIFY_KERNEL_SLUG:-ollama-verifier-v1}
      # ----- Tailscale (verifier tailnet join) -----
      # Injected into the verifier notebook at push time so it survives Kaggle
      # kernel delete/recreate (no per-kernel Kaggle Secret needed).
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - BACKEND_URL=${BACKEND_URL:-http://100.92.171.13:8000}
      # ----- ngrok -----
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      # No default domain: the reserved free-tier domain belongs to the LLM
      # server / Hermes. The backend tunnel uses an ephemeral URL; the Kaggle
      # executor reads it live from the ngrok inspector at push time.
      - NGROK_DOMAIN=${NGROK_DOMAIN:-}
      # ----- Kaggle executor -----
      - KAGGLE_USERNAME=${KAGGLE_USERNAME:-jessefleming}
      - KAGGLE_API_TOKEN=${KAGGLE_API_TOKEN}
      - KAGGLE_KERNEL_SLUG=${KAGGLE_KERNEL_SLUG:-cloud-gpu-matcher-v4-stable}
      # Executor provider: kaggle | colab | auto (auto = Kaggle, fall back to Colab on quota)
      - EXECUTOR_PROVIDER=${EXECUTOR_PROVIDER:-auto}
      - COLAB_GIST_OWNER=${COLAB_GIST_OWNER:-}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./data:/home/ibg_settings
      - ./backend:/app/backend
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./Cloud_GPU_Matcher_v4_Stable.ipynb:/app/Cloud_GPU_Matcher_v4_Stable.ipynb
      - ./Cloud_GPU_Matcher_v3_Auto.ipynb:/app/Cloud_GPU_Matcher_v3_Auto.ipynb
      - ./Ollama_Verifier_v1.ipynb:/app/Ollama_Verifier_v1.ipynb
      - ./verifier_launcher.py:/app/verifier_launcher.py
      - ./data:/app/data

networks:
  default:
    driver: bridge
